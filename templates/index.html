<!DOCTYPE html>
<html>
<head>
    <title>Contoso Web Store</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">Contoso Web Store</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/search?q=">Products</a>
                <a class="nav-link" href="/cart">Cart</a>
                <a class="nav-link" href="/login">Login</a>
                <!-- VULNERABILITY: Admin panel link visible to all -->
                <a class="nav-link" href="/admin">Admin</a>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="jumbotron text-center">
            <h1>Welcome to Contoso Web Store</h1>
            <p class="lead">Your one-stop shop for Contoso products</p>
            <form action="/search" method="GET" class="mt-4">
                <div class="input-group w-50 mx-auto">
                    <!-- VULNERABILITY: No XSS protection on search input reflection -->
                    <input type="text" name="q" class="form-control" placeholder="Search products...">
                    <button class="btn btn-primary" type="submit">Search</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
