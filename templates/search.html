<!DOCTYPE html>
<html>
<head><title>検索結果 - Contoso Web Store</title></head>
<body>
    <h1>「{{ query | safe }}」の検索結果</h1>
    <!-- VULNERABILITY: Using |safe filter allows XSS -->
    {% for product in products %}
    <div class="product-card">
        <h3>{{ product[1] }}</h3>
        <p>{{ product[2] }}</p>
        <p>¥{{ product[3] }}</p>
        <a href="/product/{{ product[0] }}">詳細を見る</a>
    </div>
    {% endfor %}
</body>
</html>
